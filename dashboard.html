<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-i18n="dashboard">Dashboard</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar" id="sidebar">

  <button class="toggle-btn" onclick="toggleSidebar()">☰</button>

  <h2 class="logo">🏦 GERESU DHUKI SACCO</h2>

  <nav class="nav">

    <a href="dashboard.html" class="nav-item active">📊 Dashboard</a>
    <a href="members.html" class="nav-item">👥 Members</a>
    <a href="savings.html" class="nav-item">💰 Savings</a>
    <a href="loans.html" class="nav-item">🏦 Loans</a>
    <a href="repayments.html" class="nav-item">💵 Repayments</a>
    <a href="withdrawals.html" class="nav-item">💸 Withdrawals</a>
    <a href="reports.html" class="nav-item">📄 Reports</a>
    <a href="users.html" class="nav-item">👤 Users</a>
    <a href="settings.html" class="nav-item">⚙️ Settings</a>
    <a href="#" id="logoutBtn" class="nav-item">🚪 Logout</a>

  </nav>

</aside>

<!-- ================= MAIN ================= -->
<main class="main">

  <!-- TOPBAR -->
  <div class="topbar">

    <h2 data-i18n="dashboardTitle">
      DASHBOARD OVERVIEW
    </h2>

    <div class="topbar-actions">

      <select id="languageSelect">
        <option value="en">English</option>
        <option value="am">አማርኛ</option>
        <option value="om">Afaan Oromoo</option>
      </select>

      <div class="selected-box">
        👤 Admin
      </div>

    </div>

  </div>

  <!-- ================= STATS ================= -->
  <section class="stats-grid">

    <div class="stat-card blue">
      <h3 data-i18n="members"></h3>
      <p id="membersCount">0</p>
    </div>

    <div class="stat-card green">
      <h3 data-i18n="savings"></h3>
      <p id="savingsTotal">0</p>
    </div>

    <div class="stat-card orange">
      <h3 data-i18n="loans"></h3>
      <p id="loansTotal">0</p>
    </div>

    <div class="stat-card red">
      <h3 data-i18n="withdrawals"></h3>
      <p id="withdrawalsTotal">0</p>
    </div>

  </section>
    
<!-- ================= QUICK ACTIONS ================= -->
<section class="quick-actions">

  <div class="action-card" data-action="addMember">
    <i class="fa fa-user-plus"></i>
    <span data-i18n="addMember"></span>
  </div>

  <div class="action-card" data-action="openSavings">
    <i class="fa fa-piggy-bank"></i>
    <span data-i18n="savings"></span>
  </div>

  <div class="action-card" data-action="openLoans">
    <i class="fa fa-landmark"></i>
    <span data-i18n="loans"></span>
  </div>

  <div class="action-card" data-action="openWithdrawals">
    <i class="fa fa-money-bill-wave"></i>
    <span data-i18n="withdrawals"></span>
  </div>

</section>
    
<!-- ================= CHARTS ================= -->
  <section class="chart-grid">

    <div class="chart-card">
      <h3 data-i18n="loanChart"></h3>
      <canvas id="barChart"></canvas>
    </div>

    <div class="chart-card">
      <h3 data-i18n="savingsChart"></h3>
      <canvas id="lineChart"></canvas>
    </div>

  </section>

</main>

<!-- ================= GLOBAL SYSTEM SCRIPTS ================= -->
<script src="js/dashboard.js"></script>
<script src="js/layout.js"></script>
<script src="js/i18n.js"></script>

</body>
</html>
