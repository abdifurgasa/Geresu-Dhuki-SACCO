<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SACCO Banking Dashboard</title>

<link rel="stylesheet" href="css/style.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar" id="sidebar">

  <div class="logo">
    🏦 SACCO
  </div>

  <nav class="nav">

    <a class="nav-item active" href="#">
      📊 Dashboard
    </a>

    <a class="nav-item" href="#">👥 Members</a>
    <a class="nav-item" href="#">💰 Savings</a>
    <a class="nav-item" href="#">🏦 Loans</a>
    <a class="nav-item" href="#">💵 Repayments</a>

    <a class="nav-item logout" onclick="logout()">
      🚪 Logout
    </a>

  </nav>

</aside>

<!-- ================= MAIN ================= -->
<main class="main">

  <!-- TOPBAR -->
  <div class="topbar">

    <button onclick="toggleSidebar()" class="menu-btn">☰</button>

    <h2>Financial Dashboard</h2>

    <div class="actions">
      🔔 <span class="badge">3</span>
    </div>

  </div>

  <!-- CARDS -->
  <section class="cards">

    <div class="card">Members <h3 id="members">0</h3></div>
    <div class="card">Savings <h3 id="savings">0</h3></div>
    <div class="card">Loans <h3 id="loans">0</h3></div>
    <div class="card">Profit <h3 id="profit">0</h3></div>

  </section>

  <!-- CHART -->
  <section class="chart-box">
    <canvas id="chart"></canvas>
  </section>

</main>

<script type="module" src="js/dashboard.js"></script>
<script type="module" src="js/auth.js"></script>

</body>
</html>
