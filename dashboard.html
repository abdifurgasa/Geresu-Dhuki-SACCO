<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SACCO Banking</title>

<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">

  <div class="brand">🏦 SACCO</div>

  <a class="nav active">Dashboard</a>
  <a class="nav">Members</a>
  <a class="nav">Savings</a>
  <a class="nav">Loans</a>

  <button onclick="toggleSidebar()" class="toggle">☰</button>

</aside>

<!-- MAIN -->
<main class="main">

  <!-- HEADER -->
  <header class="header">
    <h2>Dashboard Overview</h2>
    <div class="status">🟢 Live</div>
  </header>

  <!-- CARDS -->
  <section class="grid">

    <div class="glass-card">
      <h3>Members</h3>
      <p id="members">0</p>
    </div>

    <div class="glass-card">
      <h3>Savings</h3>
      <p id="savings">0 ETB</p>
    </div>

    <div class="glass-card">
      <h3>Loans</h3>
      <p id="loans">0 ETB</p>
    </div>

    <div class="glass-card profit">
      <h3>Profit</h3>
      <p id="profit">0 ETB</p>
    </div>

  </section>

  <!-- CHART -->
  <section class="chart">
    <canvas id="chart"></canvas>
  </section>

</main>

</div>

<script type="module" src="js/dashboard.js"></script>

<script>
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("hide");
}
</script>

</body>
</html>
