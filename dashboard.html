<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SACCO Premium Dashboard</title>

<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar" id="sidebar">

  <div class="logo">🏦 SACCO</div>

  <nav>
    <a class="nav-item active" href="#">📊 Dashboard</a>
    <a class="nav-item" href="pages/members.html">👥 Members</a>
    <a class="nav-item" href="pages/savings.html">💰 Savings</a>
    <a class="nav-item" href="pages/loans.html">🏦 Loans</a>
    <a class="nav-item danger" href="#" onclick="logout()">🚪 Logout</a>
  </nav>

  <button class="collapse-btn" onclick="toggleSidebar()">☰</button>

</aside>

<!-- ================= MAIN ================= -->
<main class="main">

  <!-- TOPBAR -->
  <div class="topbar">

    <h2>Financial Overview</h2>

    <div class="right">
      <div class="badge">Live</div>
    </div>

  </div>

  <!-- CARDS -->
  <section class="cards">

    <div class="card blue">
      <h3>Members</h3>
      <p id="members">0</p>
    </div>

    <div class="card green">
      <h3>Savings</h3>
      <p id="savings">0 ETB</p>
    </div>

    <div class="card orange">
      <h3>Loans</h3>
      <p id="loans">0 ETB</p>
    </div>

    <div class="card dark">
      <h3>Profit</h3>
      <p id="profit">0 ETB</p>
    </div>

  </section>

  <!-- CHART -->
  <section class="chart-box">
    <canvas id="chart"></canvas>
  </section>

</main>

</div>

<!-- ================= SCRIPTS ================= -->
<script type="module" src="js/auth-guard.js"></script>
<script type="module" src="js/dashboard.js"></script>

<script>
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("collapsed");
}
</script>

</body>
</html>
