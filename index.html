<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title data-i18n="dashboard">SACCO Login</title>

  <style>
    /* =========================
       BACKGROUND
    ========================= */
    body {
      margin: 0;
      height: 100vh;

      /* Times New Roman Font */
      font-family: "Times New Roman", Times, serif;

      /* Background image less zoom */
      background: url("assets/images/background.jpg") no-repeat center center;
      background-size: contain;

      display: flex;
      justify-content: center;
      align-items: center;

      position: relative;
      overflow: hidden;
    }

    /* Dark overlay */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.55);
    }

    /* =========================
       LANGUAGE SELECT
    ========================= */
    .lang-select {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 10;
    }

    .lang-select select {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      outline: none;

      font-family: "Times New Roman", Times, serif;
      font-size: 15px;
    }

    /* =========================
       LOGIN BOX
    ========================= */
    .login-box {
      position: relative;
      z-index: 2;

      width: 360px;
      padding: 35px;
      border-radius: 18px;

      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);

      border: 1px solid rgba(255, 255, 255, 0.25);

      text-align: center;

      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);

      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(25px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      color: white;
      margin-bottom: 10px;
      font-size: 34px;
      letter-spacing: 1px;
    }

    p {
      color: #f1f1f1;
      margin-bottom: 20px;
      font-size: 18px;
    }

    input {
      width: 100%;
      padding: 13px;
      margin: 10px 0;

      border: none;
      border-radius: 10px;
      outline: none;

      font-size: 16px;
      font-family: "Times New Roman", Times, serif;

      background: rgba(255, 255, 255, 0.92);
      box-sizing: border-box;
    }

    input::placeholder {
      color: #555;
    }

    /* LOGIN BUTTON */
    button {
      width: 100%;
      padding: 13px;
      margin-top: 12px;

      background: #1d4ed8;
      color: white;

      border: none;
      border-radius: 10px;

      cursor: pointer;

      font-size: 18px;
      font-weight: bold;

      font-family: "Times New Roman", Times, serif;

      transition: 0.3s;
    }

    button:hover {
      background: #163fb3;
      transform: translateY(-2px);

      box-shadow: 0 8px 20px rgba(29, 78, 216, 0.45);
    }

    /* Responsive */
    @media (max-width: 500px) {
      .login-box {
        width: 85%;
        padding: 25px;
      }

      h2 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

  <!-- LANGUAGE SELECTOR -->
  <div class="lang-select">
    <select id="langSelect" onchange="changeLang(this.value)">
      <option value="EN">English</option>
      <option value="AM">Amharic</option>
      <option value="OR">Afaan Oromo</option>
    </select>
  </div>

  <!-- LOGIN BOX -->
  <div class="login-box">

    <h2 data-i18n="dashboard">SACCO LOGIN</h2>

    <p data-i18n="welcome">Welcome Back</p>

    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

    <button onclick="login()">Login</button>

  </div>

  <!-- FIREBASE LOGIN -->
  <script type="module">
    import { auth } from "./js/firebase.js";

    import {
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    window.login = function () {

      const email =
        document.querySelector("input[type='email']").value;

      const password =
        document.querySelector("input[type='password']").value;

      signInWithEmailAndPassword(auth, email, password)

        .then(() => {
          window.location.href = "dashboard.html";
        })

        .catch(err => alert(err.message));
    };
  </script>

  <!-- i18n -->
  <script src="js/i18n.js"></script>

</body>

</html>
