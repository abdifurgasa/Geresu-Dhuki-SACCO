<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title data-i18n="title">SACCO Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

/* ================= BODY ================= */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  font-family: Inter, sans-serif;
  overflow: hidden;

  background: linear-gradient(-45deg,
    #0f172a,
    #1e293b,
    #0ea5e9,
    #6366f1
  );

  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;

  position: relative;
}

/* ================= ANIMATION ================= */
@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ================= FLOATING BLOBS ================= */
body::before,
body::after {
  content: "";
  position: absolute;
  width: 450px;
  height: 450px;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.6;
  z-index: 0;
}

body::before {
  background: #3b82f6;
  top: -120px;
  left: -120px;
  animation: float1 8s ease-in-out infinite;
}

body::after {
  background: #8b5cf6;
  bottom: -120px;
  right: -120px;
  animation: float2 10s ease-in-out infinite;
}

@keyframes float1 {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(40px,30px); }
}

@keyframes float2 {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(-40px,-30px); }
}

/* ================= LANGUAGE ================= */
.lang-select {
  position: absolute;
  top: 20px;
  right: 20px;
  z-index: 10;
}

.lang-select select {
  padding: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
}

/* ================= LOGIN BOX ================= */
.login-box {
  width: 380px;
  padding: 35px;
  border-radius: 22px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);

  border: 1px solid rgba(255,255,255,0.15);

  text-align: center;

  z-index: 10;

  box-shadow:
    0 25px 60px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.2);

  transition: 0.3s ease;
}

.login-box:hover {
  transform: translateY(-5px);
}

/* ================= INPUT ================= */
.input-group {
  text-align: left;
  margin-top: 15px;
}

label {
  color: white;
  font-size: 14px;
}

.input-box {
  display: flex;
  align-items: center;
  margin-top: 6px;

  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 12px;
}

.input-box i {
  color: white;
  margin-right: 10px;
}

.input-box input {
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
  color: white;
}

/* ================= BUTTON ================= */
button {
  width: 100%;
  margin-top: 20px;
  padding: 14px;

  border: none;
  border-radius: 14px;

  background: linear-gradient(135deg,#4facfe,#00f2fe);
  color: white;

  font-weight: bold;
  cursor: pointer;

  box-shadow: 0 10px 25px rgba(0,0,0,0.3);

  transition: all 0.3s ease;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 35px rgba(0,0,0,0.4);
}

</style>
</head>

<body>

<!-- LANGUAGE -->
<div class="lang-select">
  <select id="langSelect" onchange="changeLanguage(this.value)">
    <option value="en">English</option>
    <option value="am">አማርኛ</option>
    <option value="om">Afaan Oromoo</option>
  </select>
</div>

<!-- LOGIN -->
<div class="login-box">

  <h2 data-i18n="title">SACCO LOGIN</h2>
  <p data-i18n="welcome">Welcome Back</p>

  <div class="input-group">
    <label data-i18n="email">Email</label>
    <div class="input-box">
      <i class="fa fa-envelope"></i>
      <input id="email" type="email" placeholder="Enter email">
    </div>
  </div>

  <div class="input-group">
    <label data-i18n="password">Password</label>
    <div class="input-box">
      <i class="fa fa-lock"></i>
      <input id="password" type="password" placeholder="Enter password">
    </div>
  </div>

  <button id="loginBtn" onclick="login()" data-i18n="login">
    Login
  </button>

</div>

<script>

/* ================= LANGUAGE ================= */
const translations = {
  en: { title:"SACCO LOGIN", welcome:"Welcome Back", email:"Email", password:"Password", login:"Login" },
  am: { title:"SACCO መግቢያ", welcome:"እንኳን ደህና መጡ", email:"ኢሜይል", password:"የይለፍ ቃል", login:"ግባ" },
  om: { title:"Seensa SACCO", welcome:"Baga Nagaan Dhuftan", email:"Imeelii", password:"Jecha Darbii", login:"Seeni" }
};

function changeLanguage(lang){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key = el.getAttribute("data-i18n");
    el.innerText = translations[lang][key];
  });
}

/* ================= LOGIN ================= */
function login(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("Fill all fields");
    return;
  }

  const btn = document.getElementById("loginBtn");
  btn.innerText = "Loading...";
  btn.disabled = true;
  
 setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 1000);

 
}

</script>

</body>
</html>
