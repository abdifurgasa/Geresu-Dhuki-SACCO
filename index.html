<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Geresu Dhuki SACCO Login
  </title>

  <!-- =========================================================
       STYLE
  ========================================================= -->

  <style>

    /* =========================================================
       BODY
    ========================================================= */

    body {

      margin: 0;

      height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;

      overflow: hidden;

      position: relative;

      font-family: "Times New Roman", Times, serif;

      background-image: url("./assets/image/background.jpg");

      background-repeat: no-repeat;

      background-position: center;

      background-size: contain;

      background-color: #0f172a;

    }

    /* DARK OVERLAY */

    body::before {

      content: "";

      position: absolute;

      inset: 0;

      background: rgba(0,0,0,0.45);

      z-index: 1;

    }

    /* =========================================================
       LANGUAGE SELECT
    ========================================================= */

    .lang-select {

      position: absolute;

      top: 20px;

      right: 20px;

      z-index: 100;

    }

    .lang-select select {

      padding: 10px 14px;

      border: none;

      border-radius: 10px;

      outline: none;

      font-size: 14px;

      background: white;

      cursor: pointer;

      font-family: "Times New Roman", Times, serif;

    }

    /* =========================================================
       LOGIN BOX
    ========================================================= */

    .login-box {

      position: relative;

      z-index: 10;

      width: 380px;

      max-width: 92%;

      padding: 35px;

      border-radius: 22px;

      text-align: center;

      background: rgba(255,255,255,0.12);

      backdrop-filter: blur(18px);

      border: 1px solid rgba(255,255,255,0.2);

      box-shadow:
        0 20px 50px rgba(0,0,0,0.35);

      animation: fadeIn 0.8s ease;

    }

    @keyframes fadeIn {

      from {

        opacity: 0;

        transform: translateY(40px);

      }

      to {

        opacity: 1;

        transform: translateY(0);

      }

    }

    /* =========================================================
       LOGO
    ========================================================= */

    .logo {

      font-size: 55px;

      margin-bottom: 10px;

      animation: floatLogo 3s ease-in-out infinite;

    }

    @keyframes floatLogo {

      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-6px);
      }

      100% {
        transform: translateY(0px);
      }

    }

    /* =========================================================
       TEXT
    ========================================================= */

    h2 {

      margin: 10px 0;

      color: #ff2b2b;

      font-size: 30px;

      letter-spacing: 1px;

      font-weight: bold;

      text-shadow: 0 2px 10px rgba(0,0,0,0.4);

    }

    p {

      color: #ff4d4d;

      margin-bottom: 25px;

      font-size: 17px;

      font-weight: bold;

    }

    /* =========================================================
       INPUT GROUP
    ========================================================= */

    .input-group {

      margin-bottom: 18px;

      text-align: left;

    }

    .input-group label {

      display: block;

      margin-bottom: 7px;

      color: #ff4d4d;

      font-size: 15px;

      font-weight: bold;

    }

    .input-box {

      display: flex;

      align-items: center;

      background: rgba(255,255,255,0.15);

      border-radius: 12px;

      padding: 0 12px;

      border: 1px solid rgba(255,255,255,0.2);

    }

    .input-box i {

      color: #ff4d4d;

      font-size: 15px;

    }

    .input-box input {

      width: 100%;

      padding: 14px;

      border: none;

      outline: none;

      background: transparent;

      color: #ff4d4d;

      font-size: 15px;

      font-weight: bold;

      font-family: "Times New Roman", Times, serif;

    }

    .input-box input::placeholder {

      color: rgba(255,77,77,0.7);

    }

    /* =========================================================
       BUTTON
    ========================================================= */

    .login-btn {

      width: 100%;

      padding: 14px;

      margin-top: 10px;

      border: none;

      border-radius: 14px;

      background: #dc2626;

      color: white;

      font-size: 16px;

      font-weight: bold;

      cursor: pointer;

      transition: 0.3s;

      font-family: "Times New Roman", Times, serif;

    }

    .login-btn:hover {

      background: #b91c1c;

      transform: translateY(-2px);

      box-shadow:
        0 10px 25px rgba(220,38,38,0.45);

    }

    /* =========================================================
       FOOTER
    ========================================================= */

    .footer {

      margin-top: 20px;

      color: #ffb3b3;

      font-size: 13px;

      font-weight: bold;

    }

    /* =========================================================
       MOBILE
    ========================================================= */

    @media(max-width:600px){

      body{

        background-size: cover;

      }

      .login-box {

        width: 90%;

        padding: 25px;

      }

      h2 {

        font-size: 24px;

      }

    }

  </style>

  <!-- FONT AWESOME -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

</head>

<body>

<!-- =========================================================
     LANGUAGE SELECT
========================================================= -->

<div class="lang-select">

  <select
    id="langSelect"
    onchange="changeLanguage(this.value)"
  >

    <option value="en">
      English
    </option>

    <option value="am">
      አማርኛ
    </option>

    <option value="om">
      Afaan Oromoo
    </option>

  </select>

</div>

<!-- =========================================================
     LOGIN BOX
========================================================= -->

<div class="login-box">

  <!-- LOGO -->

  <div class="logo">
    🏦
  </div>

  <!-- TITLE -->

  <h2>
    GERESU DHUKI SACCO
  </h2>

  <p data-i18n="welcome">
    Welcome Back
  </p>

  <!-- EMAIL -->

  <div class="input-group">

    <label>
      Email
    </label>

    <div class="input-box">

      <i class="fa fa-envelope"></i>

      <input
        type="email"
        id="email"
        placeholder="Enter your email"
      />

    </div>

  </div>

  <!-- PASSWORD -->

  <div class="input-group">

    <label>
      Password
    </label>

    <div class="input-box">

      <i class="fa fa-lock"></i>

      <input
        type="password"
        id="password"
        placeholder="Enter your password"
      />

    </div>

  </div>

  <!-- LOGIN BUTTON -->

  <button
    class="login-btn"
    onclick="login()"
  >

    <i class="fa fa-right-to-bracket"></i>

    Login

  </button>

  <!-- FOOTER -->

  <div class="footer">

    © 2026 Geresu Dhuki SACCO

  </div>

</div>

</body>
</html>
