<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title data-i18n="dashboard">SACCO Login</title>

  <style>
    /* =========================
       BACKGROUND
    ========================= */
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: url("assets/images/background.jpg") no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
    }

    /* =========================
       LANGUAGE SELECT (ONE PLACE)
    ========================= */
    .lang-select {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 10;
    }

    .lang-select select {
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    /* =========================
       LOGIN BOX
    ========================= */
    .login-box {
      position: relative;
      z-index: 2;
      width: 360px;
      padding: 30px;
      border-radius: 14px;

      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.2);

      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2, p {
      color: white;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    /* 🔵 LOGIN BUTTON */
    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;

      background: #2563eb;
      color: white;

      border: none;
      border-radius: 8px;
      cursor: pointer;

      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
    }
  </style>
</head>

<body>

  <!-- 🌍 LANGUAGE SELECTOR (ONLY ONE PLACE) -->
  <div class="lang-select">
    <select id="langSelect" onchange="changeLang(this.value)">
      <option value="EN">English</option>
      <option value="AM">Amharic</option>
      <option value="OR">Afaan Oromo</option>
    </select>
  </div>

  <!-- LOGIN BOX -->
  <div class="login-box">

    <h2 data-i18n="dashboard">SACCO LOGIN</h2>

    <p data-i18n="welcome">Welcome back</p>

    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

    <button onclick="login()">Login</button>

  </div>

  <!-- =========================
       FIREBASE LOGIN
  ========================== -->
  <script type="module">
    import { auth } from "./js/firebase.js";
    import {
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    window.login = function () {
      const email = document.querySelector("input[type='email']").value;
      const password = document.querySelector("input[type='password']").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          window.location.href = "dashboard.html";
        })
        .catch(err => alert(err.message));
    };
  </script>

  <!-- =========================
       GLOBAL i18n.js (USED HERE)
  ========================== -->
<script src="js/i18n.js"></script>
</body>
</html>
