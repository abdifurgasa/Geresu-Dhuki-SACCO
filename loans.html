<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Loans
  </title>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="css/style.css"
  />

  <!-- FONT AWESOME -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

</head>

<body>

<!-- =========================================================
     SIDEBAR
========================================================= -->

<aside
  class="sidebar"
  id="sidebar"
>

  <button
    class="toggle-btn"
    onclick="toggleSidebar()"
  >
    ☰
  </button>

  <h2 class="logo">
    🏦 SACCO
  </h2>

  <nav class="nav">

    <a
      href="dashboard.html"
      class="nav-item"
    >
      <span class="icon">📊</span>
      <span class="text">Dashboard</span>
    </a>

    <a
      href="members.html"
      class="nav-item"
    >
      <span class="icon">👥</span>
      <span class="text">Members</span>
    </a>

    <a
      href="savings.html"
      class="nav-item"
    >
      <span class="icon">💰</span>
      <span class="text">Savings</span>
    </a>

    <a
      href="loans.html"
      class="nav-item active"
    >
      <span class="icon">🏦</span>
      <span class="text">Loans</span>
    </a>

    <a
      href="repayments.html"
      class="nav-item"
    >
      <span class="icon">💳</span>
      <span class="text">Repayments</span>
    </a>

    <a
      href="withdrawals.html"
      class="nav-item"
    >
      <span class="icon">📤</span>
      <span class="text">Withdrawals</span>
    </a>

    <a
      href="#"
      class="nav-item logout"
      id="logoutBtn"
    >
      <span class="icon">🚪</span>
      <span class="text">Logout</span>
    </a>

  </nav>

</aside>

<!-- =========================================================
     MAIN
========================================================= -->

<main class="main">

  <!-- TOPBAR -->
  <div class="topbar">

    <h2>
      🏦 Loans Management
    </h2>

    <div
      style="
        display:flex;
        gap:10px;
        align-items:center;
      "
    >

      <select
        id="languageSelect"
        onchange="changeLanguage(this.value)"
      >

        <option value="en">
          English
        </option>

        <option value="am">
          አማርኛ
        </option>

        <option value="om">
          Afaan Oromoo
        </option>

      </select>

      <button
        class="add-btn"
        id="openModalBtn"
      >

        <i class="fa fa-plus"></i>

        Add Loan

      </button>

    </div>

  </div>

  <!-- SEARCH -->
  <div class="search-container">

    <input
      type="text"
      id="searchMember"
      class="search-input"
      placeholder="Search member..."
    />

    <div
      id="searchResults"
      class="search-dropdown"
    ></div>

  </div>

  <!-- SELECTED -->
  <div
    id="selectedMember"
    class="selected-box"
  >

    👤 Select a member

  </div>

  <!-- TABLE -->
  <div class="table-card">

    <table class="table-modern">

      <thead>

        <tr>

          <th>
            Member
          </th>

          <th>
            Phone
          </th>

          <th>
            Principal
          </th>

          <th>
            Interest
          </th>

          <th>
            Total
          </th>

          <th>
            Remaining
          </th>

          <th>
            Type
          </th>

          <th>
            Duration
          </th>

          <th>
            Status
          </th>

          <th>
            Created Date
          </th>

          <th>
            Created By
          </th>

          <th>
            Actions
          </th>

        </tr>

      </thead>

      <tbody id="loansTable"></tbody>

    </table>

  </div>

</main>

<!-- =========================================================
     MODAL
========================================================= -->

<div
  class="modal"
  id="loanModal"
>

  <div class="modal-box">

    <div class="modal-header">

      <h3>
        🏦 Add Loan
      </h3>

      <button
        class="modal-close-icon"
        id="closeModalBtn"
      >
        ✖
      </button>

    </div>

    <!-- FORM -->
    <form id="loanForm">

      <input
        type="number"
        id="principal"
        placeholder="Loan Amount"
        required
      />

      <input
        type="number"
        id="rate"
        placeholder="Interest Rate %"
        required
      />

      <input
        type="number"
        id="time"
        placeholder="Duration"
        required
      />

      <select id="timeType">

        <option value="months">
          Months
        </option>

        <option value="years">
          Years
        </option>

      </select>

      <select id="interestType">

        <option value="simple">
          Simple Interest
        </option>

        <option value="compound">
          Compound Interest
        </option>

        <option value="flat">
          Flat Rate
        </option>

      </select>

      <button
        type="submit"
        class="save-btn"
      >

        Create Loan

      </button>

    </form>

  </div>

</div>

<!-- JS -->
<script
  type="module"
  src="js/layout.js"
></script>

<script src="js/i18n.js"></script>

<script
  type="module"
  src="js/loans.js"
></script>

</body>
</html>
