<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Loans
  </title>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="css/style.css"
  />

  <!-- FONT AWESOME -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

</head>

<body>

<!-- =========================================================
     SIDEBAR
========================================================= -->

<aside
  class="sidebar"
  id="sidebar"
>

  <!-- TOGGLE -->
  <button
    class="toggle-btn"
    onclick="toggleSidebar()"
  >
    ☰
  </button>

  <!-- LOGO -->
  <h2 class="logo">
    🏦 SACCO
  </h2>

  <!-- NAVIGATION -->
  <nav class="nav">

    <!-- DASHBOARD -->
    <a
      href="dashboard.html"
      class="nav-item active"
    >

      <span class="icon">
        📊
      </span>

      <span
        class="text"
        data-i18n="dashboard"
      >
        Dashboard
      </span>

    </a>

    <!-- MEMBERS -->
    <a
      href="members.html"
      class="nav-item admin-only"
    >

      <span class="icon">
        👥
      </span>

      <span
        class="text"
        data-i18n="members"
      >
        Members
      </span>

    </a>

    <!-- SAVINGS -->
    <a
      href="savings.html"
      class="nav-item"
    >

      <span class="icon">
        💰
      </span>

      <span
        class="text"
        data-i18n="savings"
      >
        Savings
      </span>

    </a>

    <!-- LOANS -->
    <a
      href="loans.html"
      class="nav-item"
    >

      <span class="icon">
        🏦
      </span>

      <span
        class="text"
        data-i18n="loans"
      >
        Loans
      </span>

    </a>

    <!-- REPAYMENTS -->
    <a
      href="repayments.html"
      class="nav-item"
    >

      <span class="icon">
        💵
      </span>

      <span
        class="text"
        data-i18n="repayments"
      >
        Repayments
      </span>

    </a>

    <!-- WITHDRAWALS -->
    <a
      href="withdrawals.html"
      class="nav-item admin-only"
    >

      <span class="icon">
        💸
      </span>

      <span
        class="text"
        data-i18n="withdrawals"
      >
        Withdrawals
      </span>

    </a>

    <!-- REPORTS -->
    <a
      href="reports.html"
      class="nav-item admin-only"
    >

      <span class="icon">
        📄
      </span>

      <span
        class="text"
        data-i18n="reports"
      >
        Reports
      </span>

    </a>

    <!-- USERS -->
    <a
      href="users.html"
      class="nav-item admin-only"
    >

      <span class="icon">
        👤
      </span>

      <span
        class="text"
        data-i18n="users"
      >
        Users
      </span>

    </a>

    <!-- SETTINGS -->
    <a
      href="settings.html"
      class="nav-item"
    >

      <span class="icon">
        ⚙️
      </span>

      <span
        class="text"
        data-i18n="settings"
      >
        Settings
      </span>

    </a>

    <!-- LOGOUT -->
    <a
      href="#"
      class="nav-item logout"
      id="logoutBtn"
    >

      <span class="icon">
        🚪
      </span>

      <span
        class="text"
        data-i18n="logout"
      >
        Logout
      </span>

    </a>

  </nav>

</aside>
  

<main class="main">

  <!-- TOPBAR -->
  <div class="topbar">

    <h2 data-i18n="loan_management">
      🏦 Loan Management
    </h2>

    <!-- LANGUAGE -->
    <select id="languageSelect" onchange="changeLanguage(this.value)">

      <option value="en">English</option>
      <option value="am">አማርኛ</option>
      <option value="om">Afaan Oromoo</option>

    </select>

  </div>

  <!-- =========================================================
       MEMBER ACTION BAR (SAME AS SAVINGS)
  ========================================================= -->

  <div class="member-action-bar">

    <!-- SEARCH MEMBER -->
    <div class="search-container">

      <input
        id="searchMember"
        class="search-input"
        data-i18n-placeholder="search_member"
        placeholder="🔍 Search member"
        autocomplete="off"
      />

      <div id="searchResults" class="search-dropdown"></div>

    </div>

    <!-- SELECTED MEMBER -->
    <div id="selectedMember" class="selected-box">
      👤 Select a member
    </div>

    <!-- ADD BUTTON -->
    <button class="add-btn" id="openModalBtn">
      <i class="fa fa-plus"></i>
      <span data-i18n="add_loan">Add Loan</span>
    </button>

  </div>

  <!-- =========================================================
       TABLE (SAME STYLE AS SAVINGS)
  ========================================================= -->

  <div class="table-card">

    <table class="table-modern">

      <thead>

        <tr>

          <th data-i18n="name">Name</th>
          <th data-i18n="phone">Phone</th>
          <th data-i18n="principal">Principal</th>
          <th data-i18n="interest">Interest</th>
          <th data-i18n="total">Total</th>
          <th data-i18n="remaining">Remaining</th>
          <th data-i18n="type">Type</th>
          <th data-i18n="duration">Duration</th>
          <th data-i18n="status">Status</th>
          <th data-i18n="createdDate">Created Date</th>
          <th data-i18n="createdBy">Created By</th>

        </tr>

      </thead>

      <tbody id="loansTable"></tbody>

    </table>

  </div>

</main>

<!-- =========================================================
     MODAL (SAME STYLE AS SAVINGS)
========================================================= -->

<div class="modal" id="loanModal">

  <div class="modal-box">

    <!-- HEADER -->
    <div class="modal-header">

      <h2 data-i18n="add_loan">
        Add Loan
      </h2>

      <button class="modal-close-icon" id="closeModalBtn">
        ✖
      </button>

    </div>

    <!-- FORM -->
    <form id="loanForm">

      <input type="number" id="principal" placeholder="Principal amount" required />

      <input type="number" id="rate" placeholder="Interest rate %" required />

      <input type="number" id="time" placeholder="Duration" required />

      <select id="timeType">

        <option value="months">Months</option>
        <option value="years">Years</option>

      </select>

      <select id="interestType">

        <option value="simple">Simple</option>
        <option value="compound">Compound</option>
        <option value="flat">Flat</option>

      </select>

      <button type="submit" class="save-btn">
        <span data-i18n="save">Save</span>
      </button>

    </form>

  </div>

</div>

<!-- =========================================================
     SCRIPTS
========================================================= -->

<script type="module" src="js/layout.js"></script>
<script src="js/i18n.js"></script>
<script type="module" src="js/loans.js"></script>

</body>
</html>
