<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title data-i18n="loans">
    Loans
  </title>

  <link
    rel="stylesheet"
    href="css/style.css"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

</head>

<body>

<!-- =========================================================
     SIDEBAR
========================================================= -->

<aside
  class="sidebar"
  id="sidebar"
>

  <!-- TOGGLE -->
  <button
    class="toggle-btn"
    onclick="toggleSidebar()"
  >
    ☰
  </button>

  <!-- LOGO -->
  <h2 class="logo">
    🏦 SACCO
  </h2>

  <!-- NAVIGATION -->
  <nav class="nav">

    <a
      href="dashboard.html"
      class="nav-item"
    >

      <span class="icon">
        📊
      </span>

      <span
        class="text"
        data-i18n="dashboard"
      >
        Dashboard
      </span>

    </a>

    <a
      href="members.html"
      class="nav-item active admin-only"
    >

      <span class="icon">
        👥
      </span>

      <span
        class="text"
        data-i18n="members"
      >
        Members
      </span>

    </a>

    <a
      href="savings.html"
      class="nav-item"
    >

      <span class="icon">
        💰
      </span>

      <span
        class="text"
        data-i18n="savings"
      >
        Savings
      </span>

    </a>

    <a
      href="loans.html"
      class="nav-item"
    >

      <span class="icon">
        🏦
      </span>

      <span
        class="text"
        data-i18n="loans"
      >
        Loans
      </span>

    </a>

    <a
      href="repayments.html"
      class="nav-item"
    >

      <span class="icon">
        💵
      </span>

      <span
        class="text"
        data-i18n="repayments"
      >
        Repayments
      </span>

    </a>

    <a
      href="withdrawals.html"
      class="nav-item admin-only"
    >

      <span class="icon">
        💸
      </span>

      <span
        class="text"
        data-i18n="withdrawals"
      >
        Withdrawals
      </span>

    </a>

    <a
      href="reports.html"
      class="nav-item admin-only"
    >

      <span class="icon">
        📄
      </span>

      <span
        class="text"
        data-i18n="reports"
      >
        Reports
      </span>

    </a>

    <a
      href="users.html"
      class="nav-item admin-only"
    >

      <span class="icon">
        👤
      </span>

      <span
        class="text"
        data-i18n="users"
      >
        Users
      </span>

    </a>

    <a
      href="settings.html"
      class="nav-item"
    >

      <span class="icon">
        ⚙️
      </span>

      <span
        class="text"
        data-i18n="settings"
      >
        Settings
      </span>

    </a>

    <a
      href="#"
      class="nav-item logout"
      id="logoutBtn"
    >

      <span class="icon">
        🚪
      </span>

      <span
        class="text"
        data-i18n="logout"
      >
        Logout
      </span>

    </a>

  </nav>

</aside>

<!-- =========================================================
     MAIN
========================================================= -->

<main class="main">

  <!-- TOPBAR -->

  <div class="topbar">

    <h2 data-i18n="loans_management">
      🏦 Loans Management
    </h2>

    <div
      style="
        display:flex;
        gap:10px;
        align-items:center;
      "
    >

      <select
        id="languageSelect"
        onchange="changeLanguage(this.value)"
      >

        <option value="en">
          English
        </option>

        <option value="am">
          አማርኛ
        </option>

        <option value="om">
          Afaan Oromoo
        </option>

      </select>

    </div>

  </div>

  <!-- SEARCH -->

  <div class="search-container">

    <input
      type="text"
      id="searchMember"
      class="search-input"
      data-i18n-placeholder="search_member"
      placeholder="Search member"
    />

    <div
      id="searchResults"
      class="search-dropdown"
    ></div>

  </div>

  
  <!-- SELECTED -->
  

  <div
    id="selectedMember"
    class="selected-box"
    data-i18n="select_member"
  >
    👤 Select a member
  </div>

<button
        class="add-btn"
        id="openModalBtn"
      >

        <i class="fa fa-plus"></i>

        <span data-i18n="add_loan">
          Add Loan
        </span>

      </button>
  
  <!-- TABLE -->

  <div class="table-card">

    <table class="table-modern">

      <thead>

        <tr>

          <th data-i18n="name">
            Name
          </th>

          <th data-i18n="phone">
            Phone
          </th>

          <th data-i18n="principal">
            Principal
          </th>

          <th data-i18n="interest">
            Interest
          </th>

          <th data-i18n="total">
            Total
          </th>

          <th data-i18n="remaining">
            Remaining
          </th>

          <th data-i18n="type">
            Type
          </th>

          <th data-i18n="duration">
            Duration
          </th>

          <th data-i18n="status">
            Status
          </th>

          <th data-i18n="createdDate">
            Created Date
          </th>

          <th data-i18n="createdBy">
            Created By
          </th>

          <th data-i18n="actions">
            Actions
          </th>

        </tr>

      </thead>

      <tbody id="loansTable"></tbody>

    </table>

  </div>

</main>

<!-- =========================================================
     MODAL
========================================================= -->

<div
  class="modal"
  id="loanModal"
>

  <div class="modal-box">

    <div class="modal-header">

      <h3 data-i18n="add_loan">
        Add Loan
      </h3>

      <button
        class="modal-close-icon"
        id="closeModalBtn"
      >
        ✖
      </button>

    </div>

    <form id="loanForm">

      <input
        type="number"
        id="principal"
        data-i18n-placeholder="loan_amount"
        placeholder="Loan Amount"
        required
      />

      <input
        type="number"
        id="rate"
        data-i18n-placeholder="interest_rate"
        placeholder="Interest Rate"
        required
      />

      <input
        type="number"
        id="time"
        data-i18n-placeholder="duration"
        placeholder="Duration"
        required
      />

      <select id="interestType">

        <option value="Simple">
          Simple
        </option>

        <option value="Compound">
          Compound
        </option>

        <option value="Flat">
          Flat
        </option>

      </select>

      <button
        type="submit"
        class="save-btn"
      >

        <span data-i18n="save">
          Save
        </span>

      </button>

    </form>

  </div>

</div>

<!-- =========================================================
     DELETE MODAL
========================================================= -->

<div
  class="modal"
  id="deleteModal"
>

  <div class="modal-box">

    <h3 data-i18n="delete_loan">
      Delete Loan
    </h3>

    <p
      style="margin-top:10px;"
      data-i18n="delete_confirm"
    >
      Are you sure?
    </p>

    <div
      style="
        display:flex;
        gap:10px;
        margin-top:20px;
      "
    >

      <button
        id="confirmDeleteBtn"
        class="delete-btn"
      >

        <span data-i18n="yes_delete">
          Yes Delete
        </span>

      </button>

      <button
        id="cancelDeleteBtn"
        class="cancel-btn"
      >

        <span data-i18n="cancel">
          Cancel
        </span>

      </button>

    </div>

  </div>

</div>
<script src="js/layout.js"></script>
<script src="js/i18n.js"></script>

<script
  type="module"
  src="js/loans.js"
></script>

</body>
</html>
