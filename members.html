<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SACCO Members</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="dashboard-container">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">

    <button class="menu-toggle" id="toggleBtn">
        <i class="fas fa-bars"></i>
    </button>

    <div class="sidebar-header">
        <div class="logo-icon">
            <i class="fas fa-university"></i>
        </div>

        <div class="logo-text">
            <h2>SACCO</h2>
            <span>Banking System</span>
        </div>
    </div>

    <ul class="sidebar-menu">

        <li>
            <a href="dashboard.html">
                <i class="fas fa-chart-pie"></i>
                <span data-i18n="dashboard">Dashboard</span>
            </a>
        </li>

        <li class="active">
            <a href="members.html">
                <i class="fas fa-users"></i>
                <span data-i18n="members">Members</span>
            </a>
        </li>

        <li>
            <a href="savings.html">
                <i class="fas fa-wallet"></i>
                <span data-i18n="savings">Savings</span>
            </a>
        </li>

        <li>
            <a href="loans.html">
                <i class="fas fa-landmark"></i>
                <span data-i18n="loans">Loans</span>
            </a>
        </li>

        <li>
            <a href="repayments.html">
                <i class="fas fa-money-check-dollar"></i>
                <span data-i18n="repayments">Repayments</span>
            </a>
        </li>

        <li>
            <a href="withdrawals.html">
                <i class="fas fa-money-bill-transfer"></i>
                <span data-i18n="withdrawals">Withdrawals</span>
            </a>
        </li>

        <li>
            <a href="reports.html">
                <i class="fas fa-file-alt"></i>
                <span data-i18n="reports">Reports</span>
            </a>
        </li>

        <li>
            <a href="users.html">
                <i class="fas fa-user"></i>
                <span data-i18n="users">Users</span>
            </a>
        </li>

        <li>
            <a href="settings.html">
                <i class="fas fa-gear"></i>
                <span data-i18n="settings">Settings</span>
            </a>
        </li>

    </ul>

    <div class="sidebar-footer">
        <a href="#">
            <i class="fas fa-right-from-bracket"></i>
            <span data-i18n="logout">Logout</span>
        </a>
    </div>

</aside>

<!-- MAIN CONTENT -->
<main class="main-content" id="mainContent">

<!-- TOP BAR -->
<div class="topbar">

    <div>
        <h1 data-i18n="members">Members</h1>
        <p data-i18n="overview">Manage SACCO Members</p>
    </div>

    <div class="topbar-actions">

        <div class="language-selector">
            <select id="languageSelect" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="om">Afaan Oromo</option>
                <option value="am">አማርኛ</option>
            </select>
        </div>

        <button class="btn-primary" onclick="openAddModal()">
            <i class="fas fa-plus"></i>
            Add Member
        </button>

    </div>

</div>

<!-- SEARCH -->
<div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search members...">
    <button onclick="searchMembers()">
        <i class="fas fa-search"></i>
    </button>
</div>

<!-- TABLE -->
<div class="table-container">

<table>
    <thead>
        <tr>
            <th>Full Name</th>
            <th>Phone</th>
            <th>NID</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody id="membersTable">
        <!-- Firebase Data Here -->
    </tbody>

</table>

</div>

<!-- PAGINATION -->
<div class="pagination">
    <button onclick="prevPage()">Prev</button>
    <span id="pageInfo">1</span>
    <button onclick="nextPage()">Next</button>
</div>

</main>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal" id="memberModal">

<div class="modal-content">

    <h2 id="modalTitle">Add Member</h2>

    <input type="hidden" id="memberId">

    <input type="text" id="fullName" placeholder="Full Name">

    <input type="text" id="phone" placeholder="Phone (9 digits)">

    <input type="text" id="nid" placeholder="NID (16 digits)">

    <select id="status">
        <option value="Active">Active</option>
        <option value="Inactive">Inactive</option>
    </select>

    <div class="modal-actions">
        <button onclick="saveMember()" class="btn-primary">
            Save
        </button>

        <button onclick="closeModal()" class="btn-secondary">
            Cancel
        </button>
    </div>

</div>

</div>

<!-- SCRIPTS -->
<script src="js/i18n.js"></script>
<script src="js/layout.js"></script>
<script src="js/members.js"></script>

</body>
</html>
