<!-- =========================================================
     members.html
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Members</title>

  <link
    rel="stylesheet"
    href="./style.css"
  />

</head>

<body>

  <!-- =========================================================
       TOPBAR
  ========================================================= -->

  <div class="topbar">

    <h1 data-i18n="members">
      Members
    </h1>

    <div class="top-actions">

      <!-- LANGUAGE -->

      <select id="languageSwitcher">

        <option value="en">
          English
        </option>

        <option value="om">
          Afaan Oromo
        </option>

        <option value="am">
          አማርኛ
        </option>

      </select>

      <!-- ADD MEMBER -->

      <button
        id="openModalBtn"
        class="add-btn"
        data-i18n="addMember"
      >
        Add Member
      </button>

    </div>

  </div>

  <!-- =========================================================
       MEMBERS TABLE
  ========================================================= -->

  <div class="table-wrapper">

    <table class="members-table">

      <thead>

        <tr>

          <th data-i18n="fullName">
            Full Name
          </th>

          <th data-i18n="phone">
            Phone
          </th>

          <th data-i18n="nid">
            NID
          </th>

          <th data-i18n="savings">
            Savings
          </th>

          <th data-i18n="loans">
            Loans
          </th>

          <th data-i18n="remaining">
            Remaining
          </th>

          <th data-i18n="status">
            Status
          </th>

          <th>
            Created At
          </th>

          <th>
            Created By
          </th>

        </tr>

      </thead>

      <tbody id="membersTable"></tbody>

    </table>

  </div>

  <!-- =========================================================
       ADD MEMBER MODAL
  ========================================================= -->

  <div
    class="modal"
    id="memberModal"
  >

    <div class="modal-content">

      <div class="modal-header">

        <h2 data-i18n="addMember">
          Add Member
        </h2>

        <button
          id="closeModalBtn"
          class="close-btn"
        >
          ×
        </button>

      </div>

      <form id="memberForm">

        <!-- NAME -->

        <div class="form-group">

          <label data-i18n="fullName">
            Full Name
          </label>

          <input
            type="text"
            id="name"
            required
            data-placeholder="fullNamePlaceholder"
            placeholder="Enter full name"
          />

        </div>

        <!-- PHONE -->

        <div class="form-group">

          <label data-i18n="phone">
            Phone Number
          </label>

          <input
            type="text"
            id="phone"
            maxlength="9"
            placeholder="7XXXXXXXX"
            required
          />

        </div>

        <!-- NID -->

        <div class="form-group">

          <label data-i18n="nid">
            NID Number
          </label>

          <input
            type="text"
            id="nid"
            maxlength="16"
            placeholder="16 digit NID"
            required
          />

        </div>

        <!-- SUBMIT -->

        <button
          type="submit"
          class="submit-btn"
          data-i18n="saveMember"
        >
          Save Member
        </button>

      </form>

    </div>

  </div>

  <!-- =========================================================
       PROFILE MODAL
  ========================================================= -->

  <div
    class="profile-modal"
    id="profileModal"
  >

    <div class="profile-content">

      <!-- HEADER -->

      <div class="profile-header">

        <div class="profile-user">

          <div
            class="profile-avatar"
            id="profileInitial"
          >
            M
          </div>

          <div>

            <h2 id="profileTitle">
              Member Name
            </h2>

            <p
              class="member-status"
              id="profileStatus"
            >
              Active
            </p>

          </div>

        </div>

        <button
          id="closeProfileBtn"
          class="close-btn"
        >
          ×
        </button>

      </div>

      <!-- DETAILS -->

      <div class="member-details-grid">

        <div class="detail-card">

          <span
            class="detail-label"
            data-i18n="phone"
          >
            Phone
          </span>

          <h4 id="profilePhone">
            -
          </h4>

        </div>

        <div class="detail-card">

          <span
            class="detail-label"
            data-i18n="nid"
          >
            NID
          </span>

          <h4 id="profileNid">
            -
          </h4>

        </div>

      </div>

      <!-- STATS -->

      <div class="profile-stats">

        <div class="stat-card savings-card">

          <span data-i18n="savings">
            Savings
          </span>

          <h2 id="profileSavings">
            0
          </h2>

        </div>

        <div class="stat-card loans-card">

          <span data-i18n="loans">
            Loans
          </span>

          <h2 id="profileLoans">
            0
          </h2>

        </div>

        <div class="stat-card remaining-card">

          <span data-i18n="remaining">
            Remaining
          </span>

          <h2 id="profileRemaining">
            0
          </h2>

        </div>

      </div>

      <!-- TRANSACTIONS -->

      <div class="history-section">

        <h2
          style="margin-bottom:15px;"
          data-i18n="transactions"
        >
          Transactions
        </h2>

        <div
          class="history-container"
          id="historyContainer"
        >

          <table class="history-table">

            <thead>

              <tr>

                <th>
                  Type
                </th>

                <th>
                  Amount
                </th>

                <th>
                  Previous
                </th>

                <th>
                  Total
                </th>

                <th>
                  Status
                </th>

                <th>
                  Date
                </th>

                <th>
                  Created By
                </th>

              </tr>

            </thead>

            <tbody id="historyTable"></tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

  <script
    type="module"
    src="./members.js"
  ></script>

</body>

</html>
```
