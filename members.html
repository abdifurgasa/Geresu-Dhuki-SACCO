<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SACCO Members</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="dashboard-container">

<!-- =========================
SIDEBAR
========================= -->
<aside class="sidebar" id="sidebar">

    <button class="menu-toggle" id="toggleBtn">
        <i class="fas fa-bars"></i>
    </button>

    <div class="sidebar-header">

        <div class="logo-icon">
            <i class="fas fa-university"></i>
        </div>

        <div class="logo-text">
            <h2>SACCO</h2>
            <span>Banking System</span>
        </div>

    </div>

    <ul class="sidebar-menu">

        <li>
            <a href="dashboard.html">
                <i class="fas fa-chart-pie"></i>
                <span data-i18n="dashboard">Dashboard</span>
            </a>
        </li>

        <li class="active">
            <a href="members.html">
                <i class="fas fa-users"></i>
                <span data-i18n="members">Members</span>
            </a>
        </li>

        <li>
            <a href="savings.html">
                <i class="fas fa-wallet"></i>
                <span data-i18n="savings">Savings</span>
            </a>
        </li>

        <li>
            <a href="loans.html">
                <i class="fas fa-landmark"></i>
                <span data-i18n="loans">Loans</span>
            </a>
        </li>

        <li>
            <a href="repayments.html">
                <i class="fas fa-money-check-dollar"></i>
                <span data-i18n="repayments">Repayments</span>
            </a>
        </li>

        <li>
            <a href="withdrawals.html">
                <i class="fas fa-money-bill-transfer"></i>
                <span data-i18n="withdrawals">Withdrawals</span>
            </a>
        </li>

        <li>
            <a href="reports.html">
                <i class="fas fa-file-alt"></i>
                <span data-i18n="reports">Reports</span>
            </a>
        </li>

        <li>
            <a href="users.html">
                <i class="fas fa-user"></i>
                <span data-i18n="users">Users</span>
            </a>
        </li>

        <li>
            <a href="settings.html">
                <i class="fas fa-gear"></i>
                <span data-i18n="settings">Settings</span>
            </a>
        </li>

    </ul>

    <div class="sidebar-footer">

        <a href="#" class="logout-btn">

            <i class="fas fa-right-from-bracket"></i>

            <span data-i18n="logout">
                Logout
            </span>

        </a>

    </div>

</aside>

<!-- =========================
MAIN CONTENT
========================= -->

<main class="main-content" id="mainContent">

<!-- =========================
TOPBAR
========================= -->

<div class="topbar">

    <div class="page-title">

        <h1 data-i18n="members">
            Members
        </h1>

        <p data-i18n="overview">
            Manage SACCO Members
        </p>

    </div>

    <div class="topbar-actions">

        <!-- Language -->

        <div class="language-selector">

            <select
                id="languageSelect"
                onchange="changeLanguage(this.value)"
            >
                <option value="en">English</option>
                <option value="om">Afaan Oromo</option>
                <option value="am">አማርኛ</option>
            </select>

        </div>

        <!-- Add Member -->

        <button
            class="btn-primary"
            onclick="openAddModal()"
        >

            <i class="fas fa-plus"></i>

            <span data-i18n="addMember">
                Add Member
            </span>

        </button>

    </div>

</div>

<!-- =========================
SUMMARY CARDS
========================= -->

<div class="stats-grid">

    <div class="stat-card">

        <div class="stat-top">

            <div class="stat-icon blue">
                <i class="fas fa-users"></i>
            </div>

            <div>

                <div
                    class="stat-label"
                    data-i18n="totalMembers"
                >
                    Total Members
                </div>

                <div
                    class="stat-value"
                    id="totalMembers"
                >
                    0
                </div>

            </div>

        </div>

    </div>

</div>

<!-- =========================
SEARCH BAR
========================= -->

<div class="search-section">

    <div class="search-bar">

        <input
            type="text"
            id="searchInput"
            data-i18n-placeholder="searchMembers"
            placeholder="Search Member..."
        >

        <button
            onclick="searchMembers()"
        >
            <i class="fas fa-search"></i>
        </button>

    </div>

</div>

<!-- =========================
MEMBERS TABLE
========================= -->

<div class="table-container">

<table class="members-table">

    <thead>

        <tr>

            <th data-i18n="fullName">
                Full Name
            </th>

            <th data-i18n="phone">
                Phone
            </th>

            <th data-i18n="nid">
                NID
            </th>

            <th data-i18n="status">
                Status
            </th>

            <th data-i18n="createdDate">
                Created At
            </th>

            <th data-i18n="createdBy">
                Created By
            </th>

            <th data-i18n="actions">
                Actions
            </th>

        </tr>

    </thead>

    <tbody id="membersTable">

        <!-- Firestore Members Here -->

    </tbody>

</table>

</div>
<!-- =========================
PAGINATION
========================= -->

<div class="pagination">

    <button
        class="page-btn"
        onclick="prevPage()"
    >
        <i class="fas fa-angle-left"></i>
    </button>

    <span id="pageInfo">
        Page 1
    </span>

    <button
        class="page-btn"
        onclick="nextPage()"
    >
        <i class="fas fa-angle-right"></i>
    </button>

</div>

</main>

</div>

<!-- =========================
ADD / EDIT MEMBER MODAL
========================= -->

<div
class="modal"
id="memberModal"
>

<div class="modal-content">

    <div class="modal-header">

        <h2
        id="modalTitle"
        data-i18n="addMember"
        >
            Add Member
        </h2>

        <button
        class="close-btn"
        onclick="closeModal()"
        >
            <i class="fas fa-times"></i>
        </button>

    </div>

    <input
    type="hidden"
    id="memberId"
    >

    <div class="form-group">

        <label
        data-i18n="fullName"
        >
            Full Name
        </label>

        <input
        type="text"
        id="fullName"
        >

    </div>

    <div class="form-group">

        <label
        data-i18n="phone"
        >
            Phone Number
        </label>

        <input
        type="text"
        id="phone"
        maxlength="9"
        >

    </div>

    <div class="form-group">

        <label
        data-i18n="nid"
        >
            NID Number
        </label>

        <input
        type="text"
        id="nid"
        maxlength="16"
        >

    </div>

    <div class="form-group">

        <label
        data-i18n="status"
        >
            Status
        </label>

        <select id="status">

            <option value="Active">
                Active
            </option>

            <option value="Inactive">
                Inactive
            </option>

        </select>

    </div>

    <div class="modal-actions">

        <button
        class="btn-primary"
        onclick="saveMember()"
        >
            <i class="fas fa-save"></i>
            Save
        </button>

        <button
        class="btn-secondary"
        onclick="closeModal()"
        >
            Cancel
        </button>

    </div>

</div>

</div>

<!-- =========================
PROFILE MODAL
========================= -->

<div
class="modal"
id="profileModal"
>

<div class="profile-modal">

    <button
    class="close-btn"
    onclick="closeProfile()"
    >
        <i class="fas fa-times"></i>
    </button>

    <div id="profileContent">

        <!-- Dynamic Firebase Profile -->

    </div>

</div>

</div>

<!-- ========================= FIREBASE ========================= -->

<script type="module" src="js/firebase.js"></script>

<!-- ========================= MULTI LANGUAGE ========================= -->

<script src="js/i18n.js"></script>

<!-- ========================= SIDEBAR ========================= -->

<script src="js/layout.js"></script>

<!-- ========================= MEMBERS LOGIC ========================= -->

<script type="module" src="js/members.js"></script>

</body>
</html>
