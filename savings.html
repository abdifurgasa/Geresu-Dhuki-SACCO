<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title data-i18n="savings_title">
    Savings
  </title>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="css/style.css"
  />

  <!-- FONT AWESOME -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

</head>

<body>

<!-- =========================================================
     SIDEBAR
========================================================= -->

<aside
  class="sidebar"
  id="sidebar"
>

  <!-- TOGGLE -->
  <button
    class="toggle-btn"
    onclick="toggleSidebar()"
  >
    ☰
  </button>

  <!-- LOGO -->
  <h2 class="logo">
    🏦 SACCO
  </h2>

  <!-- NAVIGATION -->
  <nav class="nav">

    <!-- DASHBOARD -->
    <a
      href="dashboard.html"
      class="nav-item"
    >

      <span class="icon">
        📊
      </span>

      <span
        class="text"
        data-i18n="dashboard"
      >
        Dashboard
      </span>

    </a>

    <!-- MEMBERS -->
    <a
      href="members.html"
      class="nav-item admin-only"
    >

      <span class="icon">
        👥
      </span>

      <span
        class="text"
        data-i18n="members"
      >
        Members
      </span>

    </a>

    <!-- SAVINGS -->
    <a
      href="savings.html"
      class="nav-item active"
    >

      <span class="icon">
        💰
      </span>

      <span
        class="text"
        data-i18n="savings"
      >
        Savings
      </span>

    </a>

    <!-- LOANS -->
    <a
      href="loans.html"
      class="nav-item"
    >

      <span class="icon">
        🏦
      </span>

      <span
        class="text"
        data-i18n="loans"
      >
        Loans
      </span>

    </a>

    <!-- REPAYMENTS -->
    <a
      href="repayments.html"
      class="nav-item"
    >

      <span class="icon">
        💵
      </span>

      <span
        class="text"
        data-i18n="repayments"
      >
        Repayments
      </span>

    </a>

    <!-- WITHDRAWALS -->
    <a
      href="withdrawals.html"
      class="nav-item admin-only"
    >

      <span class="icon">
        💸
      </span>

      <span
        class="text"
        data-i18n="withdrawals"
      >
        Withdrawals
      </span>

    </a>

    <!-- REPORTS -->
    <a
      href="reports.html"
      class="nav-item admin-only"
    >

      <span class="icon">
        📄
      </span>

      <span
        class="text"
        data-i18n="reports"
      >
        Reports
      </span>

    </a>

    <!-- USERS -->
    <a
      href="users.html"
      class="nav-item admin-only"
    >

      <span class="icon">
        👤
      </span>

      <span
        class="text"
        data-i18n="users"
      >
        Users
      </span>

    </a>

    <!-- SETTINGS -->
    <a
      href="settings.html"
      class="nav-item"
    >

      <span class="icon">
        ⚙️
      </span>

      <span
        class="text"
        data-i18n="settings"
      >
        Settings
      </span>

    </a>

    <!-- LOGOUT -->
    <a
      href="#"
      class="nav-item logout"
      id="logoutBtn"
    >

      <span class="icon">
        🚪
      </span>

      <span
        class="text"
        data-i18n="logout"
      >
        Logout
      </span>

    </a>

  </nav>

</aside>

<!-- =========================================================
     MAIN CONTENT
========================================================= -->
<main class="main">

<div class="topbar">
<h2>💰 Savings Management</h2>
</div>

<!-- MEMBER SELECT -->
<div class="form-card">

<h3>Select Member</h3>

<div class="search-container">
<input id="searchInput" class="search-input"
placeholder="Search member...">

<div id="searchResults"></div>
</div>

<div id="selectedMember" style="margin-top:10px;">
👤 No member selected
</div>

</div>

<!-- ADD SAVING -->
<div class="form-card">

<h3>Add Saving</h3>

<form id="savingForm">

<input type="number" id="amount" placeholder="Amount" required>

<button type="submit" class="primary-btn">
<i class="fa fa-plus"></i> Save
</button>

</form>

</div>

<!-- TABLE -->
<div class="table-card">

<table class="data-table">

<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Deposit</th>
<th>Previous</th>
<th>Total</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody id="savingsTable"></tbody>

</table>

</div>

</main>

<!-- PROFILE MODAL -->
<div class="modal" id="profileModal">

<div class="modal-box">

<div class="modal-header">
<h2 id="profileName">Profile</h2>
<button id="closeProfileBtn">✖</button>
</div>

<div>
<h3>Total:
<span id="profileTotalSaving">0</span>
</h3>

<table class="data-table">

<thead>
<tr>
<th>Date</th>
<th>Amount</th>
<th>By</th>
</tr>
</thead>

<tbody id="savingHistory"></tbody>

</table>

</div>

</div>

</div>
<script type="module" src="js/layout.js"></script>
<script type="module" src="js/savings.js"></script>
<script type="module" src="js/i18n.js"></script>
</body>
</html>
