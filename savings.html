<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="savings_title">Savings</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<aside
  class="sidebar"
  id="sidebar"
>

  <!-- TOGGLE -->
  <button
    class="toggle-btn"
    onclick="toggleSidebar()"
  >
    ☰
  </button>

  <!-- LOGO -->
  <h2 class="logo">
    🏦 SACCO
  </h2>

  <!-- NAVIGATION -->
  <nav class="nav">

    <!-- DASHBOARD -->
    <a
      href="dashboard.html"
      class="nav-item active"
    >

      <span class="icon">
        📊
      </span>

      <span
        class="text"
        data-i18n="dashboard"
      >
        Dashboard
      </span>

    </a>

    <!-- MEMBERS -->
    <a
      href="members.html"
      class="nav-item admin-only"
    >

      <span class="icon">
        👥
      </span>

      <span
        class="text"
        data-i18n="members"
      >
        Members
      </span>

    </a>

    <!-- SAVINGS -->
    <a
      href="savings.html"
      class="nav-item"
    >

      <span class="icon">
        💰
      </span>

      <span
        class="text"
        data-i18n="savings"
      >
        Savings
      </span>

    </a>

    <!-- LOANS -->
    <a
      href="loans.html"
      class="nav-item"
    >

      <span class="icon">
        🏦
      </span>

      <span
        class="text"
        data-i18n="loans"
      >
        Loans
      </span>

    </a>

    <!-- REPAYMENTS -->
    <a
      href="repayments.html"
      class="nav-item"
    >

      <span class="icon">
        💵
      </span>

      <span
        class="text"
        data-i18n="repayments"
      >
        Repayments
      </span>

    </a>

    <!-- WITHDRAWALS -->
    <a
      href="withdrawals.html"
      class="nav-item admin-only"
    >

      <span class="icon">
        💸
      </span>

      <span
        class="text"
        data-i18n="withdrawals"
      >
        Withdrawals
      </span>

    </a>

    <!-- REPORTS -->
    <a
      href="reports.html"
      class="nav-item admin-only"
    >

      <span class="icon">
        📄
      </span>

      <span
        class="text"
        data-i18n="reports"
      >
        Reports
      </span>

    </a>

    <!-- USERS -->
    <a
      href="users.html"
      class="nav-item admin-only"
    >

      <span class="icon">
        👤
      </span>

      <span
        class="text"
        data-i18n="users"
      >
        Users
      </span>

    </a>

    <!-- SETTINGS -->
    <a
      href="settings.html"
      class="nav-item"
    >

      <span class="icon">
        ⚙️
      </span>

      <span
        class="text"
        data-i18n="settings"
      >
        Settings
      </span>

    </a>

    <!-- LOGOUT -->
    <a
      href="#"
      class="nav-item logout"
      id="logoutBtn"
    >

      <span class="icon">
        🚪
      </span>

      <span
        class="text"
        data-i18n="logout"
      >
        Logout
      </span>

    </a>

  </nav>

</aside>


<!-- ================= MAIN ================= -->
<main class="main">

  <!-- TOP BAR -->
  <div class="topbar">

    <h2 data-i18n="savings_management">💰 Savings Management</h2>

    <!-- LANGUAGE -->
    <select id="languageSelect" onchange="changeLanguage(this.value)">
      <option value="en">English</option>
      <option value="am">አማርኛ</option>
      <option value="om">Afaan Oromoo</option>
    </select>

    <!-- BUTTON -->
    <button class="add-btn" id="openModalBtn">
      <i class="fa fa-plus"></i>
      <span data-i18n="add_savings">Add Savings</span>
    </button>

  </div>

  <!-- SEARCH -->
  <div class="search-container">
    <input id="searchMember"
           class="search-input"
           data-i18n-placeholder="search_member"
           placeholder="Search member">

    <div id="searchResults" class="search-dropdown"></div>
  </div>

  <!-- SELECTED -->
  <div id="selectedMember" class="selected-box">
    👤 Select a member
  </div>

  <!-- TABLE -->
  <div class="table-card">

    <table class="table-modern">

      <thead>
        <tr>
          <th data-i18n="name">Name</th>
          <th data-i18n="phone">Phone</th>
          <th>Amount</th>
          <th>Previous Saving</th>
          <th>Total Saving</th>
          <th>Date</th>
          <th>By</th>
        </tr>
      </thead>

      <tbody id="savingsTable"></tbody>

    </table>

  </div>

</main>

<!-- ================= MODAL ================= -->
<div class="modal" id="savingsModal">

  <div class="modal-box">

    <div class="modal-header">
      <h2 data-i18n="add_savings">Add Savings</h2>

      <button class="modal-close-icon" id="closeModalBtn">✖</button>
    </div>

    <form id="savingsForm">

      <input type="number"
             id="amount"
             data-i18n-placeholder="enter_amount"
             placeholder="Enter amount"
             required>

      <button type="submit" class="save-btn">
        <span data-i18n="save">Save</span>
      </button>

    </form>

  </div>

</div>

<!-- ================= SCRIPTS ================= -->
<script type="module" src="js/layout.js"></script>
<script src="js/i18n.js"></script>
<script type="module" src="js/savings.js"></script>

</body>
</html>
