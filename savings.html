<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SACCO Members</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="dashboard-container">

<!-- =========================
SIDEBAR
========================= -->
<aside class="sidebar" id="sidebar">

    <button class="menu-toggle" id="toggleBtn">
        <i class="fas fa-bars"></i>
    </button>

    <div class="sidebar-header">

        <div class="logo-icon">
            <i class="fas fa-university"></i>
        </div>

        <div class="logo-text">
            <h2>SACCO</h2>
            <span>Banking System</span>
        </div>

    </div>

    <ul class="sidebar-menu">

        <li>
            <a href="dashboard.html">
                <i class="fas fa-chart-pie"></i>
                <span data-i18n="dashboard">Dashboard</span>
            </a>
        </li>

        <li class="active">
            <a href="members.html">
                <i class="fas fa-users"></i>
                <span data-i18n="members">Members</span>
            </a>
        </li>

        <li>
            <a href="savings.html">
                <i class="fas fa-wallet"></i>
                <span data-i18n="savings">Savings</span>
            </a>
        </li>

        <li>
            <a href="loans.html">
                <i class="fas fa-landmark"></i>
                <span data-i18n="loans">Loans</span>
            </a>
        </li>

        <li>
            <a href="repayments.html">
                <i class="fas fa-money-check-dollar"></i>
                <span data-i18n="repayments">Repayments</span>
            </a>
        </li>

        <li>
            <a href="withdrawals.html">
                <i class="fas fa-money-bill-transfer"></i>
                <span data-i18n="withdrawals">Withdrawals</span>
            </a>
        </li>

        <li>
            <a href="reports.html">
                <i class="fas fa-file-alt"></i>
                <span data-i18n="reports">Reports</span>
            </a>
        </li>

        <li>
            <a href="users.html">
                <i class="fas fa-user"></i>
                <span data-i18n="users">Users</span>
            </a>
        </li>

        <li>
            <a href="settings.html">
                <i class="fas fa-gear"></i>
                <span data-i18n="settings">Settings</span>
            </a>
        </li>

    </ul>

    <div class="sidebar-footer">

        <a href="#" class="logout-btn">

            <i class="fas fa-right-from-bracket"></i>

            <span data-i18n="logout">
                Logout
            </span>

        </a>

    </div>

</aside>

<!-- =========================
MAIN CONTENT
========================= -->

<main class="main-content" id="mainContent">

<!-- =========================
TOPBAR
========================= -->

<div class="topbar">
<h2>💰 Savings Management</h2>
</div>

<!-- MEMBER SELECT -->
<div class="form-card">

<h3>Select Member</h3>

<div class="search-container">
<input id="searchInput" class="search-input"
placeholder="Search member...">

<div id="searchResults"></div>
</div>

<div id="selectedMember" style="margin-top:10px;">
👤 No member selected
</div>

</div>
        <!-- Language -->

        <div class="language-selector">

            <select
                id="languageSelect"
                onchange="changeLanguage(this.value)"
            >
                <option value="en">English</option>
                <option value="om">Afaan Oromo</option>
                <option value="am">አማርኛ</option>
            </select>

        </div>

        <!-- Add Member -->
          <button class="btn-primary" id="addMemberBtn">
            <i class="fas fa-plus"></i>
            <span data-i18n="addMember">Add Member</span>
        </button>

    </div>

</div>
<!-- =========================================================
     MAIN CONTENT
========================================================= -->

<!-- ADD SAVING -->
<div class="form-card">

<h3>Add Saving</h3>

<form id="savingForm">

<input type="number" id="amount" placeholder="Amount" required>

<button type="submit" class="primary-btn">
<i class="fa fa-plus"></i> Save
</button>

</form>

</div>

<!-- TABLE -->
<div class="table-card">

<table class="data-table">

<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Deposit</th>
<th>Previous</th>
<th>Total</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody id="savingsTable"></tbody>

</table>

</div>

</main>

<!-- PROFILE MODAL -->
<div class="modal" id="profileModal">

<div class="modal-box">

<div class="modal-header">
<h2 id="profileName">Profile</h2>
<button id="closeProfileBtn">✖</button>
</div>

<div>
<h3>Total:
<span id="profileTotalSaving">0</span>
</h3>

<table class="data-table">

<thead>
<tr>
<th>Date</th>
<th>Amount</th>
<th>By</th>
</tr>
</thead>

<tbody id="savingHistory"></tbody>

</table>

</div>

</div>

</div>
  
<script type="module" src="js/savings.js"></script>
<script type="module" src="js/i18n.js"></script>
</body>
</html>
