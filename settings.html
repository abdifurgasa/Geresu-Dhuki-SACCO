<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-i18n="settings">Settings</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="dashboard-container">

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar" id="sidebar">

<button class="menu-toggle" id="toggleBtn">
<i class="fas fa-bars"></i>
</button>

<div class="sidebar-header">
<div class="logo-icon">
<i class="fas fa-university"></i>
</div>
<div class="logo-text">
<h2>SACCO</h2>
<span>Banking System</span>
</div>
</div>

<ul class="sidebar-menu">

<li><a href="dashboard.html"><i class="fas fa-chart-pie"></i><span data-i18n="dashboard">Dashboard</span></a></li>
<li><a href="members.html"><i class="fas fa-users"></i><span data-i18n="members">Members</span></a></li>
<li><a href="savings.html"><i class="fas fa-wallet"></i><span data-i18n="savings">Savings</span></a></li>
<li><a href="loans.html"><i class="fas fa-landmark"></i><span data-i18n="loans">Loans</span></a></li>
<li><a href="repayments.html"><i class="fas fa-money-check"></i><span data-i18n="repayments">Repayments</span></a></li>
<li><a href="withdrawals.html"><i class="fas fa-money-bill"></i><span data-i18n="withdrawals">Withdrawals</span></a></li>
<li><a href="reports.html"><i class="fas fa-file"></i><span data-i18n="reports">Reports</span></a></li>
<li class="active"><a href="settings.html"><i class="fas fa-gear"></i><span data-i18n="settings">Settings</span></a></li>

</ul>

<div class="sidebar-footer">
<a href="#" onclick="logout()" class="logout-btn">
<i class="fas fa-right-from-bracket"></i>
<span data-i18n="logout">Logout</span>
</a>
</div>

</aside>

<!-- ================= MAIN ================= -->
<main class="main-content">

<div class="topbar">
<h1 data-i18n="settings">System Settings</h1>
</div>

<!-- ================= SETTINGS FORM ================= -->
<div class="table-container">

<form id="settingsForm">

<div class="form-group">
<label data-i18n="saccoName">SACCO Name</label>
<input type="text" id="saccoName">
</div>

<div class="form-group">
<label data-i18n="currency">Currency</label>
<input type="text" id="currency">
</div>

<div class="form-group">
<label data-i18n="interestRate">Default Interest Rate (%)</label>
<input type="number" id="interestRate">
</div>

<div class="form-group">
<label data-i18n="maxLoan">Maximum Loan Amount</label>
<input type="number" id="maxLoan">
</div>

<div class="form-group">
<label data-i18n="minSaving">Minimum Saving</label>
<input type="number" id="minSaving">
</div>

<div class="form-group">
<label data-i18n="sessionTimeout">Session Timeout (min)</label>
<input type="number" id="sessionTimeout">
</div>

<div class="modal-actions">

<button type="button" class="btn-primary" onclick="saveSettings()">
<i class="fas fa-save"></i> Save
</button>

</div>

</form>

</div>

</main>
</div>

<script type="module" src="js/i18n.js"></script>
<script type="module" src="js/layout.js"></script>
<script type="module" src="js/settings.js"></script>

</body>
</html>
