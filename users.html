<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-i18n="users">Users</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="dashboard-container">

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar" id="sidebar">

  <button class="menu-toggle" id="toggleBtn">
    <i class="fas fa-bars"></i>
  </button>

  <div class="sidebar-header">
    <div class="logo-icon">
      <i class="fas fa-university"></i>
    </div>
    <div class="logo-text">
      <h2>SACCO</h2>
      <span data-i18n="system">Banking System</span>
    </div>
  </div>

  <ul class="sidebar-menu">

    <li><a href="dashboard.html"><i class="fas fa-chart-pie"></i> <span data-i18n="dashboard">Dashboard</span></a></li>
    <li><a href="members.html"><i class="fas fa-users"></i> <span data-i18n="members">Members</span></a></li>
    <li><a href="savings.html"><i class="fas fa-wallet"></i> <span data-i18n="savings">Savings</span></a></li>
    <li><a href="loans.html"><i class="fas fa-landmark"></i> <span data-i18n="loans">Loans</span></a></li>
    <li><a href="repayments.html"><i class="fas fa-money-check"></i> <span data-i18n="repayments">Repayments</span></a></li>
    <li><a href="withdrawals.html"><i class="fas fa-money-bill"></i> <span data-i18n="withdrawals">Withdrawals</span></a></li>
    <li><a href="reports.html"><i class="fas fa-file"></i> <span data-i18n="reports">Reports</span></a></li>

    <li class="active">
      <a href="users.html"><i class="fas fa-user"></i> <span data-i18n="users">Users</span></a>
    </li>

    <li><a href="settings.html"><i class="fas fa-gear"></i> <span data-i18n="settings">Settings</span></a></li>

  </ul>

  <div class="sidebar-footer">
    <a href="#" class="logout-btn" onclick="logout()">
      <i class="fas fa-right-from-bracket"></i>
      <span data-i18n="logout">Logout</span>
    </a>
  </div>

</aside>

<!-- ================= MAIN ================= -->
<main class="main-content">

<!-- TOPBAR -->
<div class="topbar">

  <div>
    <h1 data-i18n="users">Users</h1>
    <p data-i18n="manageUsers">Manage system users</p>
  </div>

  <div class="topbar-actions">

    <select id="languageSelect" onchange="changeLanguage(this.value)">
      <option value="en">EN</option>
      <option value="am">AM</option>
      <option value="om">OM</option>
    </select>

    <button class="btn-primary" onclick="openAddUser()">
      <i class="fas fa-plus"></i>
      <span data-i18n="addUser">Add User</span>
    </button>

  </div>

</div>

<!-- STATS -->
<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-label" data-i18n="totalUsers">Total Users</div>
    <div class="stat-value" id="totalUsers">0</div>
  </div>
</div>

<!-- SEARCH -->
<div class="search-section">
  <input id="searchInput" placeholder="Search users...">
  <button onclick="searchUsers()"><i class="fas fa-search"></i></button>
</div>

<!-- TABLE -->
<div class="table-container">
<table>
<thead>
<tr>
  <th data-i18n="name">Name</th>
  <th data-i18n="email">Email</th>
  <th data-i18n="role">Role</th>
  <th data-i18n="createdDate">Created</th>
  <th data-i18n="actions">Actions</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>
</table>
</div>

<!-- PAGINATION -->
<div class="pagination">
  <button onclick="prevPage()"><i class="fas fa-angle-left"></i></button>
  <span id="pageInfo">Page 1</span>
  <button onclick="nextPage()"><i class="fas fa-angle-right"></i></button>
</div>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="userModal">

<div class="modal-content">

  <h2 id="modalTitle">Add User</h2>

  <input type="hidden" id="userId">

  <input type="text" id="name" placeholder="Name">
  <input type="email" id="email" placeholder="Email">

  <select id="role">
    <option value="admin">Admin</option>
    <option value="user">User</option>
  </select>

  <div class="modal-actions">
    <button onclick="saveUser()" class="btn-primary">Save</button>
    <button onclick="closeModal()" class="btn-secondary">Cancel</button>
  </div>

</div>

</div>

<script src="js/i18n.js"></script>
<script type="module" src="js/layout.js"></script>
<script type="module" src="js/users.js"></script>

</body>
</html>
